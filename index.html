    .reveal {
      opacity: 0;

    .reveal.active {

      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.active .stagger-item:nth-child(1) { transition-delay: 100ms; opacity: 1; transform: translateY(0); }

    .reveal.active .stagger-item:nth-child(4) { transition-delay: 400ms; opacity: 1; transform: translateY(0); }
    .reveal.active .stagger-item:nth-child(5) { transition-delay: 500ms; opacity: 1; transform: translateY(0); }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    
    .perspective-1000 { perspective: 1000px; }
